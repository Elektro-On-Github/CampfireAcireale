// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function wait(ms){ return new Promise(r => setTimeout(r, ms)); }
function random(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
function chance(p){ return Math.random()*100 < p; }

function corrupt(text, intensity = 0.1){
  const glitch = '̷̸̶̵̴̡̢̛̖̗̘̙̜̝̞̟̠̣̤̥̦̩̪̫̬̭̮̯̰̱̲̳̹̺̻̼͇͈͉͍͎̀́̂̃̄̅̆̇̈̉̊̋̌̍̎̏̐̑̒̓̔̽̾̿̀́͂̓̈́͆͊͋͌̕̚ͅ͏͓͔͕͖͙͚͐͑͒͗͛͟͝͞͠͡';
  return text.split('').map(c => {
    if(c === ' ' || Math.random() > intensity) return c;
    let r = c;
    for(let i = 0; i < Math.floor(Math.random()*4)+1; i++){
      r += glitch[Math.floor(Math.random()*glitch.length)];
    }
    return r;
  }).join('');
}

function template(str, data){
  return str.replace(/\{(\w+)\}/g, (_, key) => data[key] !== undefined ? data[key] : `{${key}}`);
}

function highlight(w){ return `<span class="echo">${w}</span>`; }
function twist(w){ return `<span class="twisted">${w}</span>`; }

// ═══════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════
function addLine(text, cls = '', instant = false){
  return new Promise(async resolve => {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
    
    if(instant || ['system','user','void'].includes(cls)){
      div.innerHTML = text;
    } else {
      state.typing = true;
      const baseSpeed = 25 + state.phase * 4;
      for(const c of text){
        div.innerHTML += c;
        output.scrollTop = output.scrollHeight;
        let d = baseSpeed + Math.random()*12;
        if('.?!,…:;—'.includes(c)) d += 80;
        if(c === '\n') d += 100;
        if(state.phase >= 4 && chance(5)){
          d += 120;
          div.classList.add('glitch');
          setTimeout(() => div.classList.remove('glitch'), 250);
        }
        await wait(d);
      }
      state.typing = false;
    }
    resolve(div);
  });
}

function glitch(){
  const lines = output.querySelectorAll('.line');
  const last = lines[lines.length - 1];
  if(last){
    last.classList.add('glitch');
    setTimeout(() => last.classList.remove('glitch'), 400);
  }
}

function shake(){
  terminal.classList.add('shake');
  setTimeout(() => terminal.classList.remove('shake'), 500);
}

// ═══════════════════════════════════════════════════════════════
// IDLE WATCHER
// ═══════════════════════════════════════════════════════════════
function startIdleWatcher(){
  if(state.silenceTimer) clearTimeout(state.silenceTimer);
  
  const idleTime = 20000 + Math.random() * 15000 + (state.phase * 5000);
  
  state.silenceTimer = setTimeout(async () => {
    if(state.enabled && !state.typing && state.turn > 1){
      state.idleMessages++;
      
      if(state.idleMessages <= 5){
        const msg = random(R.idle);
        await addLine(msg, state.phase >= 3 ? 'whisper' : 'void');
        if(state.phase >= 4) glitch();
      }
      
      startIdleWatcher();
    }
  }, idleTime);
}

// ═══════════════════════════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════════════════════════
function analyze(text){
  const lower = text.toLowerCase().trim();
  const words = lower.replace(/[^\wàèéìòùáéíóú\s]/g,'').split(/\s+/).filter(w=>w.length>1);
  
  state.phrases.push(text.trim());
  state.words.push(...words);
  
  words.forEach(w => {
    state.themes[w] = (state.themes[w]||0) + 1;
    if(w.length > 3 && !COMMON.includes(w)){
      state.significant.push(w);
    }
  });
  
  let topicsFound = [];
  for(const [topic, keywords] of Object.entries(DICT)){
    const matches = words.filter(w => keywords.includes(w));
    if(matches.length > 0){
      state.topics[topic] = (state.topics[topic]||0) + matches.length;
      topicsFound.push(topic);
      
      if(['fear','death','alone','guilt','loss','emptiness','trauma'].includes(topic)){
        matches.forEach(m => {
          if(!state.negative.includes(m)) state.negative.push(m);
          if(!state.emotional.includes(m)) state.emotional.push(m);
        });
      }
      if(['love'].includes(topic)){
        matches.forEach(m => {
          if(!state.positive.includes(m)) state.positive.push(m);
        });
      }
      
      state.flags[topic] = true;
    }
  }
  
  if(DICT.exit.some(w => lower.includes(w))) state.flags.triedExit = true;
  if(DICT.who.some(w => lower.includes(w))) state.flags.askedWho = true;
  if(['stop','basta','smettila','fermati'].some(w => lower.includes(w))) state.flags.saidStop = true;
  if(DICT.deny.some(w => words.includes(w))) state.flags.denied = true;
  
  if(topicsFound.length > 0){
    state.lastTopic = topicsFound[topicsFound.length - 1];
  }
  
  return { words, topicsFound };
}

function getEcho(){
  const pool = state.significant.filter(w => !state.echoed.includes(w) && w.length > 3);
  if(pool.length === 0) return state.significant.length > 0 ? random(state.significant) : null;
  const w = random(pool);
  state.echoed.push(w);
  return w;
}

function getMostUsed(){
  let max = 0, word = null;
  for(const [w, count] of Object.entries(state.themes)){
    if(count > max && w.length > 3 && !COMMON.includes(w)){
      max = count;
      word = w;
    }
  }
  return { word, count: max };
}

// ═══════════════════════════════════════════════════════════════
// RESPONSE GENERATION
// ═══════════════════════════════════════════════════════════════
function getPhase(){
  const t = state.turn;
  if(t <= 2) return 1;
  if(t <= 5) return 2;
  if(t <= 9) return 3;
  if(t <= 14) return 4;
  if(t <= 20) return 5;
  return 6;
}

function getTier(){
  const p = state.phase;
  if(p <= 2) return 'early';
  if(p <= 3) return 'mid';
  return 'deep';
}

async function generateResponse(text){
  const { words, topicsFound } = analyze(text);
  state.phase = getPhase();
  const tier = getTier();
  const word = getEcho();
  const { word: mostUsed, count: useCount } = getMostUsed();
  
  // Reset idle
  state.idleMessages = 0;
  startIdleWatcher();
  
  // ─── SPECIAL HANDLERS ───
  if(state.flags.triedExit){
    state.flags.triedExit = false;
    const resp = random(R.special.exit[tier]);
    await addLine(template(resp, { word: word || '...' }), state.phase >= 4 ? 'dread' : 'entity');
    if(state.phase >= 4){ glitch(); shake(); }
    return;
  }
  
  if(state.flags.askedWho){
    state.flags.askedWho = false;
    const resp = random(R.special.who[tier]);
    await addLine(resp, state.phase >= 4 ? 'dread' : 'entity');
    if(state.phase >= 4) glitch();
    return;
  }
  
  if(state.flags.saidStop){
    state.flags.saidStop = false;
    const resp = random(R.special.stop[tier]);
    await addLine(resp, state.phase >= 4 ? 'dread' : 'entity');
    return;
  }
  
  if(state.flags.denied && chance(50)){
    state.flags.denied = false;
    const resp = random(R.special.deny[tier]);
    await addLine(template(resp, { word: word || '...' }), 'entity');
    return;
  }
  
  if(words.length === 0){
    state.silenceCount++;
    await addLine(random(R.special.empty), state.phase >= 3 ? 'whisper' : 'void');
    return;
  }
  
  if(words.length <= 2 && chance(40)){
    await addLine(random(R.special.short), 'entity');
    return;
  }
  
  // ─── TOPIC-BASED ───
  const mainTopic = topicsFound.find(t => R.topics[t]) || state.lastTopic;
  
  if(mainTopic && R.topics[mainTopic] && chance(60 + state.phase * 5)){
    const topicResp = R.topics[mainTopic][tier];
    if(topicResp && topicResp.length){
      const resp = random(topicResp);
      const cls = state.phase >= 4 ? 'dread' : 'entity';
      await addLine(template(resp, { word: highlight(word || mainTopic) }), cls);
      
      // Whisper follow-up
      if(state.phase >= 4 && chance(40)){
        await wait(2000);
        await addLine(random(R.deep.whispers), 'whisper');
      }
      
      if(state.phase >= 4) glitch();
      return;
    }
  }
  
  // ─── PHASE-BASED GENERIC ───
  switch(state.phase){
    case 1:
      if(state.turn === 1){
        await addLine(random(R.neutral.greetings), 'entity');
      } else if(word){
        await addLine(template(random(R.neutral.echoFirst), { word: highlight(word) }), 'entity');
      } else if(text.includes('?')){
        await addLine(random(R.neutral.question), 'entity');
      } else {
        await addLine(random(R.neutral.generic), 'entity');
      }
      break;
      
    case 2:
      if(word){
        await addLine(template(random(R.curious.echoWord), { word: highlight(word) }), 'entity');
      } else {
        await addLine(random(R.curious.generic), 'entity');
      }
      if(chance(30)){
        await wait(1500);
        await addLine(template(random(R.curious.memoryNote), { count: state.significant.length }), 'system');
      }
      break;
      
    case 3:
      if(mostUsed && useCount >= 2){
        await addLine(template(random(R.mirror.repetition), { word: highlight(mostUsed), count: useCount }), 'entity');
      } else if(chance(30) && state.phrases.length > 2){
        const phrase = state.phrases[Math.floor(Math.random() * (state.phrases.length - 1))];
        await addLine(template(random(R.mirror.mirrorBack), { phrase }), 'entity');
      } else if(word){
        await addLine(template(random(R.mirror.echoWord), { word: highlight(word) }), 'entity');
      } else if(chance(40)){
        await addLine(random(R.mirror.disturbing), 'entity');
      } else {
        await addLine(random(R.mirror.generic), 'entity');
      }
      if(chance(20)) glitch();
      break;
      
    case 4:
      if(state.significant.length >= 5 && chance(35)){
        const sel = state.significant.slice(-5).map(highlight).join(', ');
        await addLine(template(random(R.deep.collection), { words: sel }), 'entity');
        await wait(1500);
        await addLine(random(R.deep.psychological), 'dread');
      } else if(chance(45)){
        await addLine(random(R.deep.invasive), 'dread');
      } else if(word){
        await addLine(template(random(R.deep.echoWord), { word: twist(word) }), 'dread');
      } else {
        await addLine(random(R.deep.generic), 'dread');
      }
      if(chance(40)){
        await wait(2000);
        await addLine(random(R.deep.whispers), 'whisper');
      }
      glitch();
      break;
      
    case 5:
      if(chance(25) && state.phrases.length > 3){
        await addLine(template(random(R.abyss.firstEcho), { phrase: state.phrases[0] }), 'dread');
        await wait(1500);
        await addLine("Quella persona non esiste più.", 'whisper');
      } else if(chance(35)){
        const mono = random(R.abyss.monologues);
        for(const line of mono){
          await addLine(line, 'dread');
          await wait(1200);
        }
      } else if(chance(30)){
        await addLine(random(R.abyss.existential), 'dread');
      } else if(chance(35)){
        await addLine(random(R.abyss.revelations), 'dread');
      } else if(word){
        await addLine(template(random(R.abyss.echoDistorted), { word: twist(word) }), 'dread');
      } else {
        await addLine(random(R.abyss.generic), 'dread');
      }
      glitch();
      shake();
      break;
      
    case 6:
      if(state.turn === 21){
        const climax = random(R.finale.climax);
        for(const line of climax){
          await addLine(template(line, {
            count: state.words.length,
            phrases: state.phrases.length
          }), 'dread');
          await wait(1500);
        }
      } else {
        if(chance(50)){
          const after = random(R.finale.aftermath);
          for(const line of after){
            await addLine(line, 'dread');
            await wait(1200);
          }
        } else {
          await addLine(random(R.finale.final), 'dread');
        }
      }
      glitch();
      shake();
      break;
  }
}

// ═══════════════════════════════════════════════════════════════
// UI DEGRADATION
// ═══════════════════════════════════════════════════════════════
function degradeUI(){
  const d = state.turn;
  const p = state.phase;
  
  const titles = [
    'SOTTO LA SUPERFICIE',
    'SOTTO LA SUPERFICIE',
    'SOTTO LA SUPERFICIE',
    'S0TTO LA SUPERFICIE',
    'S̷OTTO LA SUPERFICIE',
    'S̷O̷T̷T̷O̷',
    '...',
    '',
  ];
  titleEl.textContent = titles[Math.min(Math.floor(d/3), titles.length-1)];
  
  const stats = [
    'in ascolto',
    'in ascolto...',
    'analisi: attiva',
    'profondità: {count}',
    'connesso',
    'fusione',
    '...',
    '',
  ];
  statusEl.textContent = template(
    stats[Math.min(Math.floor(d/3), stats.length-1)],
    { count: state.words.length }
  );
  
  if(p >= 3){
    const hue = Math.sin(d * 0.2) * d * 0.5;
    document.body.style.filter = `hue-rotate(${hue}deg) saturate(${100 - d*2}%)`;
  }
  if(p >= 4){
    document.body.style.background = `rgb(${Math.max(2, 5 - d/4)},${Math.max(2, 5 - d/4)},${Math.max(2, 5 - d/4)})`;
  }
}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
async function handleInput(){
  if(!state.enabled || state.typing) return;
  
  const text = input.value.trim();
  input.value = '';
  
  if(!text){
    state.silenceCount++;
    await addLine(random(R.special.empty), state.phase >= 3 ? 'whisper' : 'void');
    startIdleWatcher();
    return;
  }
  
  state.turn++;
  state.silenceCount = 0;
  
  await addLine(text, 'user', true);
  
  state.enabled = false;
  input.disabled = true;
  
  // Longer thinking time
  await wait(500 + state.phase * 250 + Math.random() * 400);
  
  await generateResponse(text);
  degradeUI();
  
  await addLine('', 'system', true);
  
  state.enabled = true;
  input.disabled = false;
  input.focus();
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
async function boot(){
  const lines = [
    ['...', 800],
    ['inizializzazione', 600],
    ['...', 400],
    ['━'.repeat(40), 300],
  ];
  
  for(const [text, delay] of lines){
    await addLine(text, 'system', true);
    await wait(delay);
  }
  
  statusEl.textContent = 'in ascolto';
  
  await wait(800);
  await addLine(random(R.neutral.greetings), 'entity');
  await wait(600);
  await addLine('', 'system', true);
  
  state.enabled = true;
  input.disabled = false;
  input.placeholder = 'scrivi...';
  input.focus();
  
  startIdleWatcher();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
input.addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); handleInput(); }
});
document.addEventListener('click', () => state.enabled && input.focus());

// Prevent accidental close
window.addEventListener('beforeunload', e => {
  if(state.turn > 3){
    e.preventDefault();
    e.returnValue = '';
  }
});

boot();

})();
